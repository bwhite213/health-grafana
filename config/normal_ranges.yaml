# Normal-range reference data for dashboard "what is normal" bands.
#
# Two kinds of bands are rendered on the Grafana health dashboards:
#
# 1. POPULATION bands - clinical/population reference ranges for a healthy
#    adult male aged 30-39. These are drawn as Grafana area-fill threshold
#    bands (green zone = healthy, yellow = borderline, red = concerning).
#    Only metrics with well-established clinical norms get a population band.
#
# 2. PERSONAL bands - a 14-day rolling mean of YOUR OWN data, rendered as a
#    dashed gray line labeled "Your typical (14d)". This is generated at
#    query time in each panel via InfluxQL's `moving_average(...)` and
#    does NOT use this config file. Every timeseries panel gets one except:
#      - stacked breakdowns (sleep stages, activity intensity) where a
#        baseline would be nonsensical
#      - intraday heart-rate streams (too noisy to meaningfully average)
#
# Profile this was tuned for: 35-year-old male, 6'1" (see user memory).
# When the profile changes, update this file AND re-edit the affected
# panels' threshold steps in the dashboard JSON.

profile:
  age: 35
  sex: male
  height_cm: 185
  updated: 2026-04-15

# Each entry documents:
#   unit         - display unit
#   normal       - [low, high] = the green (healthy) zone
#   borderline   - [low, high] = the yellow (watch) zone outside normal
#   concerning   - [low, high] = the red (see doctor / investigate) zone
#   source       - citation / standard we're leaning on
#   applies_to   - which dashboard panels this band should be drawn on
#
# Panels not listed here get only a personal rolling baseline, no population
# band - that's intentional because the metric either lacks clinical norms
# (proprietary scores, HRV) or varies too much by lifestyle (active calories).

metrics:

  resting_heart_rate:
    unit: bpm
    normal: [50, 70]
    borderline: [40, 85]
    concerning: [null, 40, 85, null]   # <40 or >85
    source: >
      AHA 2023 adult RHR 60-100; athletic 30-39M Cooper Institute norms
      place "excellent" at 54-61 and "good" at 62-65. 50-70 covers the
      fit-to-normal span for a 35M without flagging genuinely low fitness
      or athletic bradycardia.
    applies_to:
      - "Multi-Source: Resting heart rate by source"
      - "Oura: HRV & lowest sleeping HR (lowest HR series only)"

  sleep_duration_hours:
    unit: h
    normal: [7, 9]
    borderline: [6, 10]
    concerning: [null, 6, 10, null]
    source: >
      CDC & National Sleep Foundation, adults 18-60:
      7-9 hours recommended, <6 or >10 consistently flagged.
    applies_to:
      - "Multi-Source: Sleep duration by source"
      - "Oura: Sleep stages (stacked) — NOT applied (stacked)"

  sleep_efficiency_pct:
    unit: percent
    normal: [85, 100]
    borderline: [75, 85]
    concerning: [null, 75]
    source: >
      Sleep medicine convention: >=85% good, 75-84% fair, <75% poor.
      Source: AASM clinical practice parameters.
    applies_to:
      - "Oura: Sleep score & efficiency (efficiency series only)"

  daily_steps:
    unit: short
    normal: [7500, null]
    borderline: [5000, 7500]
    concerning: [null, 5000]
    source: >
      Tudor-Locke pedometer-based activity classification:
      <5000 sedentary, 5000-7499 low-active, 7500-9999 somewhat-active,
      10000+ active. 7500+ used as the "green" threshold here.
    applies_to:
      - "Multi-Source: Daily steps by source"
      - "Oura: Steps"

# Metrics intentionally WITHOUT population bands (personal rolling only):
#
#   hrv_ms                   - individual variation dominates population norms
#   oura_sleep_score         - proprietary 0-100, no clinical reference
#   oura_readiness_score     - proprietary 0-100, no clinical reference
#   oura_activity_score      - proprietary 0-100, no clinical reference
#   garmin_body_battery      - proprietary 0-100, no clinical reference
#   body_temp_deviation      - bipolar metric (+/- from your own baseline)
#                              already personal by construction
#   active_calories          - varies too much by lifestyle to band
#   intraday_heart_rate      - too noisy; zone analysis is a separate view
#   activity_intensity_time  - stacked; baseline would be nonsensical
