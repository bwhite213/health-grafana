name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      # Also run on feature branches so contributors see CI results before
      # opening a PR, and so the first-time-added workflow file still fires
      # on its own introductory commit (GitHub's pull_request event has a
      # quirk where new workflows added in a PR update don't always run on
      # that same commit — push triggers do not have this limitation).
      - 'claude/**'
      - 'feature/**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate, type-check, smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pinned to the version used in the Dockerfile so local and CI
          # behaviour match exactly.
          version: "0.6.17"
          python-version: "3.13"

      # ---------------------------------------------------------------------
      # 1. Lockfile drift guard
      # ---------------------------------------------------------------------
      # Catches the pyproject.toml / uv.lock drift bug that broke the Docker
      # build on 2026-04-15 (rename from garmin-grafana -> health-grafana
      # invalidated uv.lock without regenerating it).
      - name: uv sync --locked
        run: uv sync --locked

      # ---------------------------------------------------------------------
      # 2. Python syntax safety net
      # ---------------------------------------------------------------------
      - name: Python syntax check
        run: uv run python -m compileall -q src/garmin_grafana

      # ---------------------------------------------------------------------
      # 2a. Ruff lint
      # ---------------------------------------------------------------------
      # Targets the multi-source code we own. The upstream-forked files
      # (garmin_fetch.py, garmin_bulk_importer.py, fit_activity_importer.py,
      # influxdb_exporter.py) are excluded in pyproject.toml's [tool.ruff]
      # block so we don't spam ourselves with style complaints about code
      # that wasn't written in this fork.
      - name: Ruff lint
        run: uvx --from 'ruff==0.6.9' ruff check .

      # ---------------------------------------------------------------------
      # 2b. Live-credentials scanner
      # ---------------------------------------------------------------------
      # Blocks accidental commits of real Garmin / Oura / email values.
      # The same script is wired into .pre-commit-config.yaml for local
      # enforcement — this CI step is the fail-safe for contributors who
      # haven't run `pre-commit install`.
      - name: Check for leaked secrets
        run: uv run python scripts/check_secrets.py

      # ---------------------------------------------------------------------
      # 3. Dashboard JSON validation
      # ---------------------------------------------------------------------
      # Grafana silently ignores dashboards with malformed JSON. We parse
      # each file and also walk panels to make sure every gridPos has the
      # required shape (the bug-class the rebase merges caused twice).
      - name: Validate Grafana dashboard JSON
        run: |
          uv run python - <<'PY'
          import json, pathlib, sys
          errs = 0
          for path in sorted(pathlib.Path("Grafana_Dashboard").glob("*.json")):
              try:
                  data = json.loads(path.read_text())
              except json.JSONDecodeError as exc:
                  print(f"FAIL  {path}: {exc}")
                  errs += 1
                  continue
              panels = data.get("panels") or []
              for panel in panels:
                  pid = panel.get("id", "?")
                  gp = panel.get("gridPos") or {}
                  missing = [k for k in ("h", "w", "x", "y") if k not in gp]
                  if missing:
                      print(f"FAIL  {path} panel {pid}: gridPos missing {missing}")
                      errs += 1
              print(f"ok    {path} ({len(panels)} panels)")
          sys.exit(errs)
          PY

      # ---------------------------------------------------------------------
      # 4. YAML validation
      # ---------------------------------------------------------------------
      - name: Validate YAML (compose, workflows, config)
        run: |
          uv run --with pyyaml python - <<'PY'
          import pathlib, sys
          import yaml
          targets = []
          for pattern in ("compose-example.yml", ".github/workflows/*.yml",
                          ".github/workflows/*.yaml", "config/*.yaml",
                          "Grafana_Datasource/*.yaml", "Grafana_Dashboard/*.yaml"):
              targets.extend(sorted(pathlib.Path(".").glob(pattern)))
          errs = 0
          for path in targets:
              try:
                  with open(path) as f:
                      # Use safe_load_all so multi-doc files (like k8s) are fine.
                      list(yaml.safe_load_all(f))
                  print(f"ok    {path}")
              except yaml.YAMLError as exc:
                  print(f"FAIL  {path}: {exc}")
                  errs += 1
          sys.exit(errs)
          PY

      # ---------------------------------------------------------------------
      # 5. normal_ranges stamper smoke test
      # ---------------------------------------------------------------------
      # Guards against catalog entries that fail to resolve and against
      # profile brackets that produce empty threshold lists. Uses a synthetic
      # 35M profile so the CI run is deterministic.
      - name: Normal-range stamper smoke test
        env:
          USER_AGE: "35"
          USER_SEX: "male"
        run: |
          uv run python - <<'PY'
          import sys
          sys.path.insert(0, "src")
          from garmin_grafana import normal_ranges

          profile = normal_ranges.load_profile_from_env()
          assert profile is not None, "profile should load from env"
          assert profile.age == 35 and profile.sex == "male"

          resolved = normal_ranges.resolve(profile)
          expected = {
              "resting_heart_rate",
              "sleep_duration_hours",
              "sleep_efficiency_pct",
              "daily_steps",
              "vo2_max",
          }
          missing = expected - set(resolved)
          assert not missing, f"resolve() missing keys: {missing}"

          for key, ranges in resolved.items():
              steps = normal_ranges.build_threshold_steps(ranges)
              assert len(steps) >= 2, f"{key} produced only {len(steps)} steps"

          # Idempotency: stamping a freshly-built dashboard should produce
          # zero rewrites on the second pass. We copy dashboards to a temp
          # dir so the working tree stays clean even if the first pass does
          # write (which it shouldn't, since the committed files already
          # match the 35M profile).
          import pathlib, shutil, tempfile
          with tempfile.TemporaryDirectory() as tmp:
              for p in pathlib.Path("Grafana_Dashboard").glob("*.json"):
                  shutil.copy(p, tmp)
              first = normal_ranges.stamp_dashboards(tmp, profile)
              second = normal_ranges.stamp_dashboards(tmp, profile)
              assert second == 0, f"stamper not idempotent: {second} files on second pass"
              print(f"stamper: first={first}, second={second}")
          print("normal_ranges smoke test passed")
          PY

      # ---------------------------------------------------------------------
      # 6. unified_schema normalizer smoke test
      # ---------------------------------------------------------------------
      # Exercises the Garmin -> Unified* path with a realistic input dict.
      # Catches regressions in: field filtering, empty-field guard,
      # TrainingReadiness > BodyBattery preference, discrepancy catalog
      # coverage of UnifiedVO2Max, and Oura VO2/workout point builders.
      - name: Unified schema smoke test
        run: |
          uv run python - <<'PY'
          import sys
          sys.path.insert(0, "src")
          from garmin_grafana.sources import unified_schema as u
          from garmin_grafana import discrepancy as d

          # --- Garmin side with TrainingReadiness + VO2 + activity ---
          pts = u.garmin_to_unified(
              date_str="2026-04-14",
              device_name="Quatix 7 Pro",
              database_name="GarminStats",
              daily_stats={
                  "wellnessStartTimeGmt": "2026-04-14T04:00:00.0",
                  "totalSteps": 12000,
                  "restingHeartRate": 55,
                  "maxHeartRate": 180,
                  "minHeartRate": 42,
                  "minAvgHeartRate": 60,
                  "activeKilocalories": 500,
                  "bmrKilocalories": 1500,
                  "bodyBatteryAtWakeTime": 95,
              },
              max_metrics=[{"generic": {"vo2MaxPreciseValue": 52.3}}],
              training_readiness=[{"score": 82, "timestamp": "2026-04-14T06:30:00.000"}],
              activities=[{
                  "startTimeGMT": "2026-04-14 10:00:00",
                  "activityType": {"typeKey": "running"},
                  "duration": 3600, "calories": 450, "distance": 5000,
                  "averageHR": 155, "maxHR": 180,
              }],
          )
          emitted = {p["measurement"] for p in pts}
          required = {
              "UnifiedActivity",
              "UnifiedHeartRate",
              "UnifiedReadiness",
              "UnifiedVO2Max",
              "UnifiedWorkout",
          }
          missing = required - emitted
          assert not missing, f"garmin_to_unified missing: {missing}"

          readiness = next(p for p in pts if p["measurement"] == "UnifiedReadiness")
          assert readiness["fields"]["score"] == 82.0, (
              f"TrainingReadiness should beat BodyBattery (95): {readiness}"
          )

          workout = next(p for p in pts if p["measurement"] == "UnifiedWorkout")
          assert workout["tags"]["Activity"] == "running"
          assert workout["fields"]["duration_s"] == 3600

          # --- Oura side with VO2 + workouts ---
          opts = u.oura_to_unified(
              date_str="2026-04-14",
              device_name="Oura Ring",
              database_name="GarminStats",
              vo2_max={"day": "2026-04-14", "vo2_max": 50.1},
              workouts=[{
                  "day": "2026-04-14",
                  "start_datetime": "2026-04-14T10:00:00+00:00",
                  "end_datetime": "2026-04-14T11:00:00+00:00",
                  "activity": "running",
                  "calories": 440, "distance": 4800,
                  "average_heart_rate": 152, "max_heart_rate": 175,
                  "intensity": "high",
              }],
          )
          oura_emitted = {p["measurement"] for p in opts}
          assert "UnifiedVO2Max" in oura_emitted
          assert "UnifiedWorkout" in oura_emitted

          # --- Empty-fields guard ---
          assert u.unified_vo2_max_point(
              source="Garmin", device="x", database_name="y",
              time="2026-04-14", vo2_max=None,
          ) is None
          assert u.unified_heart_rate_point(
              source="Garmin", device="x", database_name="y",
              time="2026-04-14",
              rhr=None, hr_avg=None, hr_max=None, hr_min=None,
          ) is None

          # --- Discrepancy catalog includes vo2_max ---
          labels = [m[2] for m in d.COMPARED_METRICS]
          assert "vo2_max" in labels

          # --- Apple side with sleep + activity + hr + vo2 + workout ---
          apts = u.apple_to_unified(
              date_str="2026-04-14",
              device_name="iOS",
              database_name="GarminStats",
              sleep={
                  "total_s": 25200, "deep_s": 3600, "light_s": 18000,
                  "rem_s": 3600, "awake_s": 600, "efficiency": 97.7,
                  "hrv_avg": 48.0,
              },
              activity={
                  "steps": 8500, "calories_active": 420,
                  "calories_total": 2100, "distance_m": 6200,
                  "active_minutes": 55,
              },
              heart_rate={
                  "rhr": 56, "hr_avg": 72, "hr_max": 135, "hr_min": 52,
              },
              vo2_max=51.8,
              workouts=[{
                  "start": "2026-04-14T10:00:00-07:00",
                  "activity_type": "running",
                  "duration_s": 1800, "calories": 320, "distance_m": 5000,
                  "hr_avg": 155, "hr_max": 175,
              }],
          )
          apple_emitted = {p["measurement"] for p in apts}
          apple_required = {
              "UnifiedSleep",
              "UnifiedActivity",
              "UnifiedHeartRate",
              "UnifiedVO2Max",
              "UnifiedWorkout",
          }
          missing_apple = apple_required - apple_emitted
          assert not missing_apple, f"apple_to_unified missing: {missing_apple}"
          apple_sources = {p["tags"]["Source"] for p in apts}
          assert apple_sources == {"Apple"}, (
              f"apple_to_unified must tag Source=Apple only, got {apple_sources}"
          )

          # --- Apple HealthKit importer: end-to-end parse + priority pick ---
          import pathlib, tempfile
          from garmin_grafana.sources import apple_healthkit

          xml = """<?xml version="1.0" encoding="UTF-8"?>
          <HealthData locale="en_US">
            <Record type="HKQuantityTypeIdentifierStepCount" sourceName="Apple Watch" unit="count" startDate="2026-04-14 10:00:00 -0700" endDate="2026-04-14 11:00:00 -0700" value="5000"/>
            <Record type="HKQuantityTypeIdentifierStepCount" sourceName="iPhone" unit="count" startDate="2026-04-14 10:00:00 -0700" endDate="2026-04-14 11:00:00 -0700" value="4800"/>
            <Record type="HKQuantityTypeIdentifierRestingHeartRate" sourceName="iPhone" unit="count/min" startDate="2026-04-14 00:00:00 -0700" endDate="2026-04-14 23:59:59 -0700" value="55"/>
          </HealthData>
          """
          with tempfile.TemporaryDirectory() as tmp:
              xml_path = pathlib.Path(tmp) / "export.xml"
              xml_path.write_text(xml)
              agg = apple_healthkit.parse_export(xml_path)
              unified_pts, raw_pts = apple_healthkit.build_points(
                  agg, device="iOS", database_name="GarminStats",
                  preferred_source="Apple Watch",
              )
          # Priority pick: Apple Watch wins for activity on the contested day.
          steps_pts = [p for p in unified_pts if p["measurement"] == "UnifiedActivity"]
          assert len(steps_pts) == 1, f"expected 1 UnifiedActivity, got {steps_pts}"
          assert steps_pts[0]["fields"]["steps"] == 5000, (
              f"Apple Watch (5000) should beat iPhone (4800): {steps_pts[0]}"
          )
          # RHR fallback: pulled from iPhone because Watch didn't record it.
          hr_pts = [p for p in unified_pts if p["measurement"] == "UnifiedHeartRate"]
          assert hr_pts and hr_pts[0]["fields"].get("rhr") == 55, (
              f"iPhone RHR fallback failed: {hr_pts}"
          )
          # Raw: per-source audit trail preserved.
          raw_devices = sorted({p["tags"]["Device"] for p in raw_pts if p["measurement"] == "AppleHealthActivity"})
          assert raw_devices == ["Apple Watch", "iPhone"], (
              f"raw AppleHealthActivity should keep per-device rows: {raw_devices}"
          )

          print("unified_schema smoke test passed")
          PY

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    # Parallel with `validate` — this job only needs git + docker and has
    # no Python dep on the lint job. Fails the PR if the multi-stage build
    # breaks (e.g. pyproject/uv.lock drift, new runtime file missing
    # COPY, wrong base image tag, etc.) — the exact failure mode we hit
    # during the initial multi-source merge.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build fetcher image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: false
          tags: health-grafana-ci-smoke:latest
          # Cache build layers across runs to keep the step under 2 min.
          cache-from: type=gha
          cache-to: type=gha,mode=max
