name: Deploy

# Fires after the `CI` workflow finishes on main. If CI failed, the
# `if:` guard below skips the deploy — so a broken push never rolls out.
# The self-hosted runner on the home server polls GitHub; no inbound
# ports are required on the server.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Rebuild and restart stack
    # Only deploy on a successful CI run (or a manual workflow_dispatch).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, health-grafana-server]
    timeout-minutes: 15
    steps:
      - name: Run deploy script
        # No actions/checkout step by design: the deploy script operates
        # on the stack's own repo clone (the one docker compose reads),
        # not on a fresh runner-side checkout. HEALTH_GRAFANA_REPO_ROOT
        # points at that clone; set it as a runner-level env var (via
        # the .env file in the runner root) or override here.
        shell: bash
        run: bash "${HEALTH_GRAFANA_REPO_ROOT:-/home/beezy/workspace/health-grafana}/scripts/deploy.sh"
        env:
          DEPLOY_BRANCH: main
          HEALTH_TIMEOUT: "240"
